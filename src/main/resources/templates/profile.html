<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>个人中心</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments :: sidebar('profile')}"></div>
    <main class="main-content">
        <section class="page-header"><div><p class="eyebrow">Identity & Access</p><h1>个人中心</h1><p>支持修改姓名、手机号、头像地址和登录密码。</p></div></section>
        <div class="message success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="message error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <section class="panel form-panel">
            <form th:action="@{/profile}" th:object="${profileForm}" method="post">
                <div class="form-grid">
                    <div class="form-item"><label>姓名</label><input th:field="*{fullName}" type="text"></div>
                    <div class="form-item"><label>手机号</label><input th:field="*{phone}" type="text"></div>
                    <div class="form-item full-width"><label>头像地址</label><input th:field="*{avatarUrl}" type="text" placeholder="可填写图片 URL"></div>
                    <div class="form-item"><label>原密码</label><input th:field="*{oldPassword}" type="password"></div>
                    <div class="form-item"><label>新密码</label><input th:field="*{newPassword}" type="password"></div>
                    <div class="form-item"><label>确认新密码</label><input th:field="*{confirmPassword}" type="password"></div>
                </div>
                <div class="form-actions"><button class="primary-btn" type="submit">保存修改</button></div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
