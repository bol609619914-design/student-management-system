<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>权限管理</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments :: sidebar('users')}"></div>
    <main class="main-content">
        <section class="page-header"><div><p class="eyebrow">Identity & Access Management</p><h1>角色权限管理</h1><p>支持管理员、教师、学生三类角色分配，为后续菜单权限与功能访问控制提供基础。</p></div></section>
        <div class="message success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <section class="panel">
            <table>
                <thead><tr><th>姓名</th><th>用户名</th><th>当前角色</th><th>操作</th></tr></thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.fullName}">系统管理员</td>
                    <td th:text="${user.username}">admin</td>
                    <td th:text="${user.role.label}">管理员</td>
                    <td>
                        <form th:action="@{'/users/' + ${user.id} + '/role'}" method="post" class="inline-form">
                            <select name="role">
                                <option th:each="role : ${roles}" th:value="${role}" th:text="${role.label}" th:selected="${role == user.role}"></option>
                            </select>
                            <button class="secondary-btn" type="submit">更新角色</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
