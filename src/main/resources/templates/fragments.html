<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="sidebar(active)">
    <div class="brand">
        <h2>教务系统</h2>
        <p th:text="${currentUser != null and currentUser.role.name() == 'STUDENT' ? '个人学习中心' : '五大模块一体化平台'}">五大模块一体化平台</p>
    </div>
    <nav class="menu">
        <a th:classappend="${active == 'dashboard'} ? ' active'"
           th:href="@{/dashboard}"
           th:text="${currentUser != null and currentUser.role.name() == 'STUDENT' ? '我的首页' : (currentUser != null and currentUser.role.name() == 'TEACHER' ? '教学首页' : '总览首页')}">总览首页</a>
        <a th:classappend="${active == 'students'} ? ' active'"
           th:href="@{/students}"
           th:text="${currentUser != null and currentUser.role.name() == 'STUDENT' ? '我的学籍' : '学籍信息'}">学籍信息</a>
        <a th:classappend="${active == 'courses'} ? ' active'" th:href="@{/courses}">课程与选课</a>
        <a th:classappend="${active == 'grades'} ? ' active'"
           th:href="@{/grades}"
           th:text="${currentUser != null and currentUser.role.name() == 'STUDENT' ? '我的成绩' : '成绩评价'}">成绩评价</a>
        <a th:classappend="${active == 'announcements'} ? ' active'" th:href="@{/announcements}">
            <span th:text="${currentUser != null and currentUser.role.name() == 'STUDENT' ? '通知公告' : '公告通知'}">公告通知</span>
            <span class="badge-dot" th:if="${unreadAnnouncementCount > 0}" th:text="${unreadAnnouncementCount}">1</span>
        </a>
        <a th:classappend="${active == 'leaves'} ? ' active'"
           th:href="@{/leaves}"
           th:text="${currentUser != null and currentUser.role.name() == 'STUDENT' ? '我的请假' : '请假审批'}">请假审批</a>
        <a th:if="${currentUser != null and currentUser.role.name() == 'ADMIN'}"
           th:classappend="${active == 'users'} ? ' active'"
           th:href="@{/users}">权限管理</a>
        <a th:classappend="${active == 'profile'} ? ' active'" th:href="@{/profile}">个人中心</a>
    </nav>
    <div class="sidebar-footer" th:if="${currentUser != null}">
        <div class="avatar-mini" th:text="${#strings.substring(currentUser.fullName,0,1)}">我</div>
        <div>
            <strong th:text="${currentUser.fullName}">系统用户</strong>
            <p th:text="${currentUser.role.label}">学生</p>
        </div>
    </div>
</aside>
</body>
</html>
