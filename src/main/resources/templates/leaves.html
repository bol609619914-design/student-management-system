<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>请假审批</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments :: sidebar('leaves')}"></div>
    <main class="main-content">
        <section class="page-header"><div><p class="eyebrow">Campus Services</p><h1>考勤请假与审批</h1><p>学生在线提交请假申请，教师或管理员审批后自动标记考勤关联状态。</p></div></section>
        <div class="message success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <section class="panel form-panel" th:if="${currentUser.role.name() == 'STUDENT'}">
            <form th:action="@{/leaves}" method="post">
                <div class="form-grid">
                    <div class="form-item full-width"><label>请假原因</label><input name="reason" type="text"></div>
                    <div class="form-item"><label>开始日期</label><input name="startDate" type="date"></div>
                    <div class="form-item"><label>结束日期</label><input name="endDate" type="date"></div>
                </div>
                <div class="form-actions"><button class="primary-btn" type="submit">提交申请</button></div>
            </form>
        </section>
        <section class="panel">
            <table>
                <thead><tr><th>学生</th><th>时间</th><th>原因</th><th>状态</th><th>考勤关联</th><th>操作</th></tr></thead>
                <tbody>
                <tr th:each="item : ${leaveRequests}">
                    <td th:text="${item.student.name}">王小明</td>
                    <td th:text="${item.startDate + ' 至 ' + item.endDate}">2026-04-05</td>
                    <td th:text="${item.reason}">事假</td>
                    <td th:text="${item.status.label}">待审批</td>
                    <td th:text="${item.attendanceLinked ? '已关联' : '未关联'}">已关联</td>
                    <td class="actions" th:if="${currentUser.role.name() != 'STUDENT'}">
                        <a class="link-btn" th:href="@{'/leaves/' + ${item.id} + '/approve?approved=true&comment=审批通过'}">通过</a>
                        <a class="danger-btn" th:href="@{'/leaves/' + ${item.id} + '/approve?approved=false&comment=审批驳回'}">驳回</a>
                    </td>
                    <td th:if="${currentUser.role.name() == 'STUDENT'}">等待处理</td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
