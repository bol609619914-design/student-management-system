<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">学生表单</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="admin-shell">
    <div th:replace="~{fragments :: sidebar('students')}"></div>
    <main class="main-content">
        <section class="page-header">
            <div>
                <p class="eyebrow">Student Form</p>
                <h1 th:text="${pageTitle}">新增学生</h1>
                <p>录入学生基础档案，支持专业、照片、入学日期和状态信息。</p>
            </div>
        </section>

        <section class="panel form-panel">
            <form th:action="${formAction}" th:object="${student}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="form-grid">
                    <div class="form-item"><label>学号</label><input th:field="*{studentNo}" type="text"></div>
                    <div class="form-item"><label>姓名</label><input th:field="*{name}" type="text"></div>
                    <div class="form-item"><label>年龄</label><input th:field="*{age}" type="number"></div>
                    <div class="form-item">
                        <label>性别</label>
                        <select th:field="*{gender}">
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="form-item"><label>班级</label><input th:field="*{classroom}" type="text"></div>
                    <div class="form-item"><label>专业</label><input th:field="*{major}" type="text"></div>
                    <div class="form-item"><label>手机号</label><input th:field="*{phone}" type="text"></div>
                    <div class="form-item"><label>入学日期</label><input th:field="*{enrollmentDate}" type="date"></div>
                    <div class="form-item"><label>当前状态</label><input th:field="*{currentStatus}" type="text"></div>
                    <div class="form-item full-width"><label>照片地址</label><input th:field="*{photoUrl}" type="text"></div>
                </div>
                <div class="form-actions">
                    <button class="primary-btn" type="submit">保存</button>
                    <a class="secondary-btn" th:href="@{/students}">返回</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
